<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>モモ語彙チャレンジ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    background: #1a1a2e;
    color: #eee;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 12px 16px 8px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    flex-shrink: 0;
  }

  .title-block h1 { font-size: 1.2rem; color: #ffb4d4; }
  .title-block p { font-size: 0.72rem; color: #aaa; margin-top: 2px; }

  .timer-block {
    text-align: center;
    cursor: pointer;
    user-select: none;
  }
  .timer-num {
    font-size: 2.6rem;
    font-weight: bold;
    color: #ffb4d4;
    line-height: 1;
    transition: color 0.3s;
  }
  .timer-num.danger { color: #ff6b6b; }
  .timer-num.pulse { animation: pulse 0.6s infinite alternate; }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.4; } }
  .timer-label { font-size: 0.65rem; color: #888; margin-top: 2px; }

  .instruction { font-size: 0.72rem; color: #999; margin-bottom: 8px; flex-shrink: 0; }

  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 7px;
    flex: 1;
    overflow: hidden;
  }

  .vocab-card {
    background: #16213e;
    border: 2px solid #2a2a5a;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 6px 4px;
    transition: background 0.2s, border-color 0.2s;
    text-align: center;
    min-height: 0;
  }
  .vocab-card:hover { border-color: #ffb4d4; }
  .vocab-card.revealed { background: #1a4731; border-color: #4caf7d; }
  .vocab-card.review { border-style: dashed; }
  .review-tag { font-size: 0.5rem; color: #f5a623; margin-bottom: 2px; }

  .word-ja { font-size: 1.05rem; font-weight: bold; color: #eee; line-height: 1.2; }
  .word-reading { font-size: 0.65rem; color: #aaa; margin-top: 2px; }
  .word-meaning { font-size: 0.72rem; color: #a8e6c1; margin-top: 5px; display: none; line-height: 1.3; }
  .vocab-card.revealed .word-meaning { display: block; }

  footer {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 8px;
    flex-shrink: 0;
  }

  button {
    padding: 8px 22px;
    border-radius: 20px;
    border: none;
    font-size: 0.85rem;
    font-family: inherit;
    cursor: pointer;
    font-weight: bold;
  }
  .btn-reveal { background: #c0436a; color: white; }
  .btn-reveal:hover { background: #e05580; }
  .btn-reset { background: #2a2a5a; color: #ccc; border: 1px solid #444; }
  .btn-reset:hover { background: #3a3a7a; }

  .note { text-align: center; font-size: 0.62rem; color: #666; margin-top: 4px; flex-shrink: 0; }
</style>
</head>
<body>

<header>
  <div class="title-block">
    <h1>📖 モモ語彙チャレンジ</h1>
    <p>今日の読書語彙 ｜ カードをタップして意味を確認！</p>
  </div>
  <div class="timer-block" onclick="toggleTimer()">
    <div class="timer-num" id="timerNum">60</div>
    <div class="timer-label" id="timerLabel">▶ タップしてスタート</div>
  </div>
</header>

<div class="instruction">💡 各カードをクリックすると意味が出るよ。タイマーが終わる前に全部確認できるかな？（黄色い点線＝復習の言葉）</div>

<div class="grid" id="grid"></div>

<footer>
  <button class="btn-reveal" onclick="revealAll()">全部見る</button>
  <button class="btn-reset" onclick="goBack()">もう一度</button>
</footer>
<div class="note">緑 = 確認済み</div>

<script>
const words = [
  {
    "ja": "大理石",
    "reading": "だいりせき",
    "meaning": "白くて<ruby>固<rt>かた</rt></ruby>い<ruby>高級<rt>こうきゅう</rt></ruby>な石",
    "review": false
  },
  {
    "ja": "逆流",
    "reading": "ぎゃくりゅう",
    "meaning": "<ruby>反対<rt>はんたい</rt></ruby>の<ruby>方向<rt>ほうこう</rt></ruby>に<ruby>流<rt>なが</rt></ruby>れること",
    "review": false
  },
  {
    "ja": "圧力",
    "reading": "あつりょく",
    "meaning": "<ruby>押<rt>お</rt></ruby>してくる力",
    "review": false
  },
  {
    "ja": "間隔",
    "reading": "かんかく",
    "meaning": "物と物の間のあき",
    "review": false
  },
  {
    "ja": "合奏",
    "reading": "がっそう",
    "meaning": "何人かが一<ruby>緒<rt>しょ</rt></ruby>に<ruby>楽器<rt>がっき</rt></ruby>を<ruby>演奏<rt>えんそう</rt></ruby>すること",
    "review": false
  },
  {
    "ja": "存在",
    "reading": "そんざい",
    "meaning": "そこにあること・いること",
    "review": false
  },
  {
    "ja": "案内",
    "reading": "あんない",
    "meaning": "道や<ruby>場所<rt>ばしょ</rt></ruby>を教えて<ruby>連<rt>つ</rt></ruby>れていくこと",
    "review": false
  },
  {
    "ja": "光景",
    "reading": "こうけい",
    "meaning": "目の前に見えるながめや<ruby>様子<rt>ようす</rt></ruby>",
    "review": false
  },
  {
    "ja": "追跡",
    "reading": "ついせき",
    "meaning": "後ろから<ruby>追<rt>お</rt></ruby>いかけること",
    "review": true
  },
  {
    "ja": "彫像",
    "reading": "ちょうぞう",
    "meaning": "石や<ruby>金属<rt>きんぞく</rt></ruby>でつくった人や<ruby>動物<rt>どうぶつ</rt></ruby>の<ruby>像<rt>ぞう</rt></ruby>",
    "review": true
  },
  {
    "ja": "断言",
    "reading": "だんげん",
    "meaning": "はっきりと「そうだ」と言い切ること",
    "review": true
  },
  {
    "ja": "輝く",
    "reading": "かがやく",
    "meaning": "<ruby>明<rt>あか</rt></ruby>るくキラキラと<ruby>光<rt>ひか</rt></ruby>ること",
    "review": true
  }
];

const grid = document.getElementById('grid');
words.forEach(w => {
  const card = document.createElement('div');
  card.className = 'vocab-card' + (w.review ? ' review' : '');
  card.innerHTML = `
    ${w.review ? `<div class="review-tag">🔁 ふくしゅう</div>` : ''}
    <div class="word-ja">${w.ja}</div>
    ${w.reading ? `<div class="word-reading">${w.reading}</div>` : ''}
    <div class="word-meaning">${w.meaning}</div>
  `;
  card.onclick = () => card.classList.toggle('revealed');
  grid.appendChild(card);
});

let seconds = 60, running = false, timer = null;
const timerNum = document.getElementById('timerNum');
const timerLabel = document.getElementById('timerLabel');

function updateDisplay() {
  timerNum.textContent = seconds;
  const danger = seconds <= 10;
  timerNum.classList.toggle('danger', danger);
  timerNum.classList.toggle('pulse', danger && running);
  if (seconds <= 0) { timerNum.textContent = '⏰'; timerLabel.textContent = "TIME'S UP!"; }
}

function toggleTimer() {
  if (seconds <= 0) { resetTimer(); return; }
  if (running) {
    clearInterval(timer); running = false;
    timerLabel.textContent = '▶ タップしてスタート';
    timerNum.classList.remove('pulse');
  } else {
    running = true;
    timerLabel.textContent = '⏸ タップして一時停止';
    timer = setInterval(() => {
      seconds--;
      updateDisplay();
      if (seconds <= 0) { clearInterval(timer); running = false; }
    }, 1000);
  }
}

function resetTimer() {
  clearInterval(timer); running = false; seconds = 60;
  timerNum.classList.remove('danger', 'pulse');
  timerLabel.textContent = '▶ タップしてスタート';
  updateDisplay();
}

function revealAll() {
  document.querySelectorAll('.vocab-card').forEach(c => c.classList.add('revealed'));
}

function goBack() {
  document.querySelectorAll('.vocab-card.revealed').forEach(c => c.classList.remove('revealed'));
  resetTimer();
}

updateDisplay();
</script>
</body>
</html>
