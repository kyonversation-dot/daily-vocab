<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>弟たちにチャレンジ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    background: #1a1a2e;
    color: #eee;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 12px 16px 8px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    flex-shrink: 0;
  }

  .title-block h1 { font-size: 1.2rem; color: #ffb4d4; }
  .title-block p { font-size: 0.72rem; color: #aaa; margin-top: 2px; }

  .timer-block {
    text-align: center;
    cursor: pointer;
    user-select: none;
  }
  .timer-num {
    font-size: 2.6rem;
    font-weight: bold;
    color: #ffb4d4;
    line-height: 1;
    transition: color 0.3s;
  }
  .timer-num.danger { color: #ff6b6b; }
  .timer-num.pulse { animation: pulse 0.6s infinite alternate; }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.4; } }
  .timer-label { font-size: 0.65rem; color: #888; margin-top: 2px; }

  .instruction { font-size: 0.72rem; color: #999; margin-bottom: 8px; flex-shrink: 0; }

  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 7px;
    flex: 1;
    overflow: hidden;
  }

  .vocab-card {
    background: #16213e;
    border: 2px solid #2a2a5a;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 6px 4px;
    transition: background 0.2s, border-color 0.2s;
    text-align: center;
    min-height: 0;
  }
  .vocab-card:hover { border-color: #ffb4d4; }
  .vocab-card.revealed { background: #1a4731; border-color: #4caf7d; }
  .vocab-card.review { border-style: dashed; }
  .review-tag { font-size: 0.5rem; color: #f5a623; margin-bottom: 2px; }

  .word-ja { font-size: 1.05rem; font-weight: bold; color: #eee; line-height: 1.2; }
  .word-reading { font-size: 0.65rem; color: #aaa; margin-top: 2px; }
  .word-meaning { font-size: 0.72rem; color: #a8e6c1; margin-top: 5px; display: none; line-height: 1.3; }
  .vocab-card.revealed .word-meaning { display: block; }

  footer {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 8px;
    flex-shrink: 0;
  }

  button {
    padding: 8px 22px;
    border-radius: 20px;
    border: none;
    font-size: 0.85rem;
    font-family: inherit;
    cursor: pointer;
    font-weight: bold;
  }
  .btn-reveal { background: #c0436a; color: white; }
  .btn-reveal:hover { background: #e05580; }
  .btn-reset { background: #2a2a5a; color: #ccc; border: 1px solid #444; }
  .btn-reset:hover { background: #3a3a7a; }

  .note { text-align: center; font-size: 0.62rem; color: #666; margin-top: 4px; flex-shrink: 0; }

</style>
</head>
<body>

<header>
  <div class="title-block">
    <h1>📖 弟たちにチャレンジ</h1>
    <p>ひなののことばれんしゅう ｜ カードをタップして意味を確認！</p>
  </div>
  <div class="timer-block" onclick="toggleTimer()">
    <div class="timer-num" id="timerNum">60</div>
    <div class="timer-label" id="timerLabel">▶ タップしてスタート</div>
  </div>
</header>

<div class="instruction">💡 各カードをクリックすると意味が出るよ。タイマーが終わる前に全部確認できるかな？（黄色い点線＝復習の言葉）</div>

<div class="grid" id="grid"></div>

<footer>
  <button class="btn-reveal" onclick="revealAll()">全部見る</button>
  <button class="btn-reset" onclick="goBack()">もう一度</button>
</footer>
<div class="note">緑 = 確認済み</div>

<script>
const words = [
  {
    "ja": "描写",
    "reading": "びょうしゃ",
    "meaning": "様子や<ruby>心情<rt>しんじょう</rt></ruby>を、<ruby>読<rt>よ</rt></ruby>み<ruby>手<rt>て</rt></ruby>が<ruby>想像<rt>そうぞう</rt></ruby>できるように<ruby>描<rt>えが</rt></ruby>くこと（この単元のキーワード）",
    "review": false
  },
  {
    "ja": "心情",
    "reading": "しんじょう",
    "meaning": "心の中の<ruby>気持<rt>きも</rt></ruby>ち・<ruby>思<rt>おも</rt></ruby>い",
    "review": false
  },
  {
    "ja": "疎開",
    "reading": "そかい",
    "meaning": "<ruby>空襲<rt>くうしゅう</rt></ruby>からのがれるため、<ruby>都会<rt>とかい</rt></ruby>から<ruby>地方<rt>ちほう</rt></ruby>へ引っこすこと",
    "review": false
  },
  {
    "ja": "配給",
    "reading": "はいきゅう",
    "meaning": "<ruby>不足<rt>ふそく</rt></ruby>した物を、政府が<ruby>決<rt>き</rt></ruby>まった量ずつ配ること（戦争中のしくみ）",
    "review": false
  },
  {
    "ja": "防空壕",
    "reading": "ぼうくうごう",
    "meaning": "<ruby>爆撃<rt>ばくげき</rt></ruby>から身を守るために<ruby>掘<rt>ほ</rt></ruby>った<ruby>穴<rt>あな</rt></ruby>・地下室",
    "review": false
  },
  {
    "ja": "空襲",
    "reading": "くうしゅう",
    "meaning": "飛行機が空から<ruby>爆弾<rt>ばくだん</rt></ruby>を落として<ruby>攻撃<rt>こうげき</rt></ruby>すること",
    "review": false
  },
  {
    "ja": "爆撃",
    "reading": "ばくげき",
    "meaning": "<ruby>爆弾<rt>ばくだん</rt></ruby>を落として<ruby>攻撃<rt>こうげき</rt></ruby>すること",
    "review": false
  },
  {
    "ja": "栄養失調",
    "reading": "えいようしっちょう",
    "meaning": "食べ物が足りず、体に<ruby>必要<rt>ひつよう</rt></ruby>な<ruby>栄養<rt>えいよう</rt></ruby>がとれていない<ruby>状態<rt>じょうたい</rt></ruby>",
    "review": false
  }
];

const grid = document.getElementById('grid');
words.forEach(w => {
  const card = document.createElement('div');
  card.className = 'vocab-card' + (w.review ? ' review' : '');
  card.innerHTML = `
    ${w.review ? `<div class="review-tag">🔁 ふくしゅう</div>` : ''}
    <div class="word-ja">${w.ja}</div>
    ${w.reading ? `<div class="word-reading">${w.reading}</div>` : ''}
    <div class="word-meaning">${w.meaning}</div>
  `;
  card.onclick = () => card.classList.toggle('revealed');
  grid.appendChild(card);
});

let seconds = 60, running = false, timer = null;
const timerNum = document.getElementById('timerNum');
const timerLabel = document.getElementById('timerLabel');

function updateDisplay() {
  timerNum.textContent = seconds;
  const danger = seconds <= 10;
  timerNum.classList.toggle('danger', danger);
  timerNum.classList.toggle('pulse', danger && running);
  if (seconds <= 0) { timerNum.textContent = '⏰'; timerLabel.textContent = "TIME'S UP!"; }
}

function toggleTimer() {
  if (seconds <= 0) { resetTimer(); return; }
  if (running) {
    clearInterval(timer); running = false;
    timerLabel.textContent = '▶ タップしてスタート';
    timerNum.classList.remove('pulse');
  } else {
    running = true;
    timerLabel.textContent = '⏸ タップして一時停止';
    timer = setInterval(() => {
      seconds--;
      updateDisplay();
      if (seconds <= 0) { clearInterval(timer); running = false; }
    }, 1000);
  }
}

function resetTimer() {
  clearInterval(timer); running = false; seconds = 60;
  timerNum.classList.remove('danger', 'pulse');
  timerLabel.textContent = '▶ タップしてスタート';
  updateDisplay();
}

function revealAll() {
  document.querySelectorAll('.vocab-card').forEach(c => c.classList.add('revealed'));
}

function goBack() {
  document.querySelectorAll('.vocab-card.revealed').forEach(c => c.classList.remove('revealed'));
  resetTimer();
}

updateDisplay();
</script>
</body>
</html>
