<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5年の漢字マッチング</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    background: #1a1a2e;
    color: #eee;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 12px 16px 8px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    flex-shrink: 0;
  }

  .title-block h1 { font-size: 1.2rem; color: #ffb4d4; }
  .title-block p { font-size: 0.72rem; color: #aaa; margin-top: 2px; }

  .score-block { text-align: center; }
  .score-num { font-size: 2rem; font-weight: bold; color: #ffb4d4; line-height: 1; }
  .score-label { font-size: 0.65rem; color: #888; margin-top: 2px; }

  .instruction { font-size: 0.72rem; color: #999; margin-bottom: 8px; flex-shrink: 0; }

  .game-area {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    flex: 1;
    overflow: hidden;
  }

  .column { display: flex; flex-direction: column; gap: 6px; overflow: hidden; }
  .col-label { font-size: 0.7rem; color: #888; text-align: center; margin-bottom: 2px; flex-shrink: 0; }

  .card {
    background: #16213e;
    border: 2px solid #2a2a5a;
    border-radius: 8px;
    padding: 8px 10px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    min-height: 0;
  }

  .word-card .text { font-size: 1.0rem; font-weight: bold; }
  .word-card .reading { font-size: 0.63rem; color: #aaa; margin-top: 2px; }
  .meaning-card .text { font-size: 0.76rem; line-height: 1.4; }

  .card:hover:not(.matched):not(.selected) { border-color: #ffb4d4; }
  .card.selected { border-color: #f5a623; background: #2a1f00; }
  .card.matched { border-color: #4caf7d; background: #1a4731; cursor: default; opacity: 0.7; }
  .card.wrong { border-color: #ff6b6b; background: #3a1a1a; animation: shake 0.4s; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .complete-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    z-index: 10;
  }
  .complete-overlay.show { display: flex; }
  .complete-overlay h2 { font-size: 2rem; color: #ffb4d4; }
  .complete-overlay p { color: #aaa; font-size: 0.9rem; }

  footer {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 8px;
    flex-shrink: 0;
  }

  button {
    padding: 8px 22px;
    border-radius: 20px;
    border: none;
    font-size: 0.85rem;
    font-family: inherit;
    cursor: pointer;
    font-weight: bold;
  }
  .btn-primary { background: #c0436a; color: white; }
  .btn-primary:hover { background: #e05580; }
  .btn-secondary { background: #2a2a5a; color: #ccc; border: 1px solid #444; }
  .btn-secondary:hover { background: #3a3a7a; }

  .progress { font-size: 0.72rem; color: #888; text-align: center; margin-top: 4px; flex-shrink: 0; }

  .word-ja { font-size: 2.4rem; }
  .word-card .text { font-size: 2rem; }

</style>
</head>
<body>

<header>
  <div class="title-block">
    <h1>🔗 5年の漢字マッチング</h1>
    <p>マヤの漢字れんしゅう ｜ 語彙と意味を正しく結ぼう！</p>
  </div>
  <div class="score-block">
    <div class="score-num" id="scoreNum">0</div>
    <div class="score-label">正解</div>
  </div>
</header>

<div class="instruction">💡 左の言葉をクリック → 右の意味をクリックで組み合わせを確認！</div>

<div class="game-area">
  <div class="column">
    <div class="col-label">📝 言葉</div>
    <div id="wordCol"></div>
  </div>
  <div class="column">
    <div class="col-label">💬 意味</div>
    <div id="meaningCol"></div>
  </div>
</div>

<div class="progress" id="progress"></div>

<footer>
  <button class="btn-secondary" onclick="shuffle()">シャッフル</button>
  <button class="btn-primary" onclick="resetGame()">もう一度</button>
</footer>

<div class="complete-overlay" id="overlay">
  <h2>🎉 全問正解！</h2>
  <p id="mistakeMsg"></p>
  <button class="btn-primary" onclick="resetGame()">もう一度やる</button>
  <button class="btn-secondary" onclick="location.reload()">新しいセットで</button>
</div>

<script>
const allWords = [
  {
    "ja": "快",
    "reading": "カイ／こころよ(い)",
    "meaning": "気持ちがよい（<ruby>快適<rt>かいてき</rt></ruby>）",
    "review": true
  },
  {
    "ja": "境",
    "reading": "キョウ／さかい",
    "meaning": "場所のさかい目（<ruby>国境<rt>こっきょう</rt></ruby>）",
    "review": true
  },
  {
    "ja": "移",
    "reading": "イ／うつ(る)",
    "meaning": "場所や時が動く（<ruby>移動<rt>いどう</rt></ruby>）",
    "review": true
  },
  {
    "ja": "質",
    "reading": "シツ",
    "meaning": "中身・ものの性質（<ruby>質問<rt>しつもん</rt></ruby>）",
    "review": true
  },
  {
    "ja": "応",
    "reading": "オウ／こた(える)",
    "meaning": "こたえる・受けてかえす（<ruby>応答<rt>おうとう</rt></ruby>）",
    "review": true
  },
  {
    "ja": "仮",
    "reading": "カ／かり",
    "meaning": "一時の・本当でない（<ruby>仮<rt>かり</rt></ruby>）",
    "review": true
  },
  {
    "ja": "寄",
    "reading": "キ／よ(る)",
    "meaning": "近づく・あずける（<ruby>寄<rt>よ</rt></ruby>る）",
    "review": true
  },
  {
    "ja": "幹",
    "reading": "カン／みき",
    "meaning": "木のみき・中心（<ruby>幹<rt>みき</rt></ruby>）",
    "review": true
  },
  {
    "ja": "眼",
    "reading": "ガン／まなこ",
    "meaning": "目（<ruby>眼科<rt>がんか</rt></ruby>）",
    "review": true
  },
  {
    "ja": "格",
    "reading": "カク",
    "meaning": "位・きまり（<ruby>性格<rt>せいかく</rt></ruby>）",
    "review": true
  },
  {
    "ja": "益",
    "reading": "エキ",
    "meaning": "もうけ・ためになること（<ruby>利益<rt>りえき</rt></ruby>）",
    "review": true
  },
  {
    "ja": "価",
    "reading": "カ／あたい",
    "meaning": "ねうち・ねだん（<ruby>価格<rt>かかく</rt></ruby>）",
    "review": true
  }
];

const BATCH_SIZE = Math.min(8, allWords.length);
let currentBatch = [], selectedWord = null, selectedMeaning = null;
let score = 0, mistakes = 0, matched = 0;

function getRandom(arr, n) { return [...arr].sort(() => Math.random() - 0.5).slice(0, n); }
function shuffleArr(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function initBatch() {
  currentBatch = getRandom(allWords, BATCH_SIZE);
  selectedWord = null; selectedMeaning = null; matched = 0;
  renderCards(); updateProgress();
}

function renderCards() {
  const wordCol = document.getElementById('wordCol');
  const meaningCol = document.getElementById('meaningCol');
  wordCol.innerHTML = ''; meaningCol.innerHTML = '';

  const shuffledMeanings = shuffleArr(currentBatch);

  currentBatch.forEach(w => {
    const wCard = document.createElement('div');
    wCard.className = 'card word-card';
    wCard.dataset.id = w.ja;
    wCard.innerHTML = `<div><div class="text">${w.ja}</div>${w.reading ? `<div class="reading">${w.reading}</div>` : ''}</div>`;
    wCard.onclick = () => selectWord(wCard, w.ja);
    wordCol.appendChild(wCard);
  });

  shuffledMeanings.forEach(w => {
    const mCard = document.createElement('div');
    mCard.className = 'card meaning-card';
    mCard.dataset.id = w.ja;
    mCard.innerHTML = `<div class="text">${w.meaning}</div>`;
    mCard.onclick = () => selectMeaning(mCard, w.ja);
    meaningCol.appendChild(mCard);
  });
}

function selectWord(card, id) {
  if (card.classList.contains('matched')) return;
  document.querySelectorAll('.word-card.selected').forEach(c => c.classList.remove('selected'));
  selectedWord = id;
  card.classList.add('selected');
  checkMatch();
}

function selectMeaning(card, id) {
  if (card.classList.contains('matched')) return;
  document.querySelectorAll('.meaning-card.selected').forEach(c => c.classList.remove('selected'));
  selectedMeaning = id;
  card.classList.add('selected');
  checkMatch();
}

function checkMatch() {
  if (!selectedWord || !selectedMeaning) return;
  const wCard = document.querySelector(`.word-card[data-id="${selectedWord}"]`);
  const mCard = document.querySelector(`.meaning-card[data-id="${selectedMeaning}"]`);

  if (selectedWord === selectedMeaning) {
    score++; matched++;
    document.getElementById('scoreNum').textContent = score;
    wCard.classList.remove('selected'); mCard.classList.remove('selected');
    wCard.classList.add('matched'); mCard.classList.add('matched');
    if (matched === BATCH_SIZE) setTimeout(() => showComplete(), 400);
  } else {
    mistakes++;
    wCard.classList.add('wrong'); mCard.classList.add('wrong');
    setTimeout(() => {
      wCard.classList.remove('wrong', 'selected');
      mCard.classList.remove('wrong', 'selected');
    }, 600);
  }
  selectedWord = null; selectedMeaning = null;
  updateProgress();
}

function updateProgress() {
  document.getElementById('progress').textContent =
    `このセット: ${matched} / ${BATCH_SIZE} 完了　｜　ミス: ${mistakes}回`;
}

function showComplete() {
  const msg = document.getElementById('mistakeMsg');
  msg.textContent = mistakes === 0 ? 'ミスなし！完璧だよ！✨' : `ミス ${mistakes} 回。もう一度やってみよう！`;
  document.getElementById('overlay').classList.add('show');
}

function resetGame() {
  score = 0; mistakes = 0;
  document.getElementById('scoreNum').textContent = '0';
  document.getElementById('overlay').classList.remove('show');
  initBatch();
}

function shuffle() {
  mistakes = 0; score = 0;
  document.getElementById('scoreNum').textContent = '0';
  document.getElementById('overlay').classList.remove('show');
  initBatch();
}

initBatch();
</script>
</body>
</html>
